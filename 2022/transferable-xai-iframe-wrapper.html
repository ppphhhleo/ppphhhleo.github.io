<h2>Interactive</h2>
<div>
Application <select id="input_appId">
  <option value="housingprice-kingcounty">Housing Price: King County</option>
  <option value="housingprice-nyc">Housing Price: NYC</option>
  <option value="health-pima-diabetes">Health: Pima Diabetes</option>
  <option value="health-heart-disease">Health: Heart Disease</option>
</select> |
Trial <input id="text_pairId" value="1" size="2" maxlength="2" disabled/> <input id="input_pairId" type="range" min="1" max="50" value="1" style="width:250px" /><br/>
Explanation Type <select id="input_xaiType">
  <option value="none">None</option>
  <option value="ref" selected>Reference</option>
  <option value="new">New</option>
</select> |
Show Similarity <input id="input_showSimilarity" type="checkbox" /> |
Show Prediction <input id="input_showPrediction" type="checkbox" />
</div>
<iframe id="interactiveIframeRef" 
        src="transferable-xai-ui.html?appId=housingprice-kingcounty&pairId=1&isRef=1&xaiType=ref&showSimilarity=0&showPrediction=0" 
		width="880px" height="300px"
		frameBorder="0" scrolling="no"
		></iframe>
<br/>
<iframe id="interactiveIframe" 
        src="transferable-xai-ui.html?appId=housingprice-kingcounty&pairId=1&isRef=0&xaiType=ref&showSimilarity=0&showPrediction=0" 
		width="880px" height="300px"
		frameBorder="0" scrolling="no"
		></iframe>
		
<script>
function updateIframeUrl(iframeId) {
	const appId = document.querySelector("#input_appId").value;
	const pairId = document.querySelector("#input_pairId").value;
	const xaiType = document.querySelector("#input_xaiType").value;
	const showSimilarity = document.querySelector("#input_showSimilarity").checked ? 1 : 0;
	const showPrediction = document.querySelector("#input_showPrediction").checked ? 1 : 0;
	//console.log(refId, rankFromRef, xaiType, showSimilarity, showPrediction);
	
	const urlRef = "transferable-xai-ui.html?appId="+appId+"&pairId="+pairId+"&isRef="+1+"&xaiType="+'ref'+"&showSimilarity="+showSimilarity+"&showPrediction="+showPrediction;
	document.querySelector("#interactiveIframeRef").src = urlRef;
	const url = "transferable-xai-ui.html?appId="+appId+"&pairId="+pairId+"&isRef="+0+"&xaiType="+xaiType+"&showSimilarity="+showSimilarity+"&showPrediction="+showPrediction;
	document.querySelector("#interactiveIframe").src = url;
	
	document.querySelector("#text_pairId").value = pairId;
}
document.querySelector("#input_appId").onchange = updateIframeUrl;
document.querySelector("#input_pairId").onchange = updateIframeUrl;
document.querySelector("#input_xaiType").onchange = updateIframeUrl;
document.querySelector("#input_showSimilarity").onchange = updateIframeUrl;
document.querySelector("#input_showPrediction").onchange = updateIframeUrl;
</script>

</body>

</html>
